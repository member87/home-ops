---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-postgis
  namespace: dawarich
  labels:
    app: dawarich-postgis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dawarich-postgis
  template:
    metadata:
      labels:
        app: dawarich-postgis
    spec:
      containers:
        - name: postgis
          image: postgis/postgis:17-3.5-alpine
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "dawarich"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dawarich-secrets
                  key: DATABASE_PASSWORD
            - name: POSTGRES_DB
              value: "dawarich_production"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: dshm
              mountPath: /dev/shm
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - dawarich
                - -d
                - dawarich_production
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - dawarich
                - -d
                - dawarich_production
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dawarich-db-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dawarich-postgis
  namespace: dawarich
  labels:
    app: dawarich-postgis
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: dawarich-postgis
