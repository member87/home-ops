    240 15 10\n  primary-color: 220 15 85\n  contrast-multiplier: 1.2\n"
kind: ConfigMap
metadata:
  name: glance-config-ccbm875tm2
  namespace: glance
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: glance
  name: glance
  namespace: glance
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: http
  selector:
    app: glance
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: glance
  name: glance
  namespace: glance
spec:
  replicas: 3
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
    spec:
      containers:
      - envFrom:
        - secretRef:
            name: glance-secrets
        image: glanceapp/glance:v0.8.4
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        name: glance
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - mountPath: /app/config/glance.yml
          name: config
          subPath: glance.yml
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app: glance
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
      volumes:
      - configMap:
          name: glance-config-ccbm875tm2
        name: config
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: glance-secrets
  namespace: glance
spec:
  encryptedData:
    CHANGE_DETECTION_TOKEN: 
  template:
    metadata:
      name: glance-secrets
      namespace: glance
    type: Opaque
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: glance-cert
  namespace: glance
spec:
  dnsNames:
  - glance.lab.jackhumes.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  secretName: glance-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: glance
  namespace: glance
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`glance.lab.jackhumes.com`)
    services:
    - name: glance
      port: 8080
  tls:
    secretName: glance-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: glance-http
  namespace: glance
spec:
  entryPoints:
  - web
  routes:
  - kind: Rule
    match: Host(`glance.lab.jackhumes.com`)
    middlewares:
    - name: redirect-https
    services:
    - name: glance
      port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: glance
spec:
  redirectScheme:
    permanent: true
    scheme: https
