---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: gotty
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gotty
  namespace: gotty
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`k9s.lab.jackhumes.com`)
      kind: Rule
      middlewares:
        - name: tinyauth-forwardauth
      services:
        - name: gotty
          port: 8080
  tls:
    secretName: gotty-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gotty-http
  namespace: gotty
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`k9s.lab.jackhumes.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: gotty
          port: 8080
