---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: headscale
data:
  config.yaml: |
    ---
    server_url: https://headscale.jackhumes.com
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    grpc_listen_addr: 0.0.0.0:50443
    grpc_allow_insecure: true

    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential

    derp:
      server:
        # Embedded DERP relay, served over HTTPS via server_url
        # (https://headscale.jackhumes.com -> VPS:443 -> FRP -> headscale:8080).
        # Lets the tailnet tunnel come up on networks that block WireGuard UDP and
        # Tailscale's public DERP relays (root cause of "connect = no internet").
        enabled: true
        region_id: 999
        region_code: "headscale"
        region_name: "Headscale Embedded DERP"
        # Only nodes registered with this Headscale may use the relay.
        verify_clients: true
        # Required when the DERP server is enabled. STUN (UDP 3478) aids NAT
        # traversal on normal networks; it is not exposed outside the pod, so
        # direct-path discovery still falls back to the public DERP map below.
        stun_listen_addr: "0.0.0.0:3478"
        private_key_path: /var/lib/headscale/derp_server_private.key
        automatically_add_embedded_derp_region: true
        # Publish the VPS public IP directly so clients reach the relay even when
        # DNS is not yet working (exit-node bootstrap scenario).
        ipv4: 140.238.67.83
      # Keep Tailscale's public DERP as a fallback for NAT traversal where reachable.
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      auto_update_enabled: true
      update_frequency: 24h

    disable_check_updates: false
    ephemeral_node_inactivity_timeout: 30m

    database:
      type: sqlite
      sqlite:
        path: /var/lib/headscale/db.sqlite

    log:
      format: text
      level: info

    dns:
      magic_dns: true
      base_domain: tailnet.jackhumes.com
      override_local_dns: true
      nameservers:
        global:
          - 10.0.0.201
        split:
          lab.jackhumes.com:
            - 10.0.0.201
      extra_records: []

    oidc:
      only_start_if_oidc_is_available: false
      issuer: https://auth.jackhumes.com
      client_id: ab49bd88-09b1-4330-bc41-f84c9ad4e61d
      client_secret_path: /etc/headscale/secrets/client_secret
      scope:
        - openid
        - profile
        - email
        - groups
      pkce:
        enabled: true
        method: S256
