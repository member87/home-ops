---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config
  namespace: home-assistant
data:
  configuration.yaml: |
    default_config:

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.0.0.0/8

    # Matter integration - requires manual setup via UI on first deploy:
    #   Settings > Devices & Services > Add Integration > Matter
    #   URL: http://localhost:5580/ws
    #
    # OTBR integration - requires manual setup via UI on first deploy:
    #   Settings > Devices & Services > Add Integration > Open Thread Border Router
    #   URL: http://localhost:8081
    #
    # Thread integration - auto-discovered after OTBR is configured
