---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config
  namespace: home-assistant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: otbr-data
  namespace: home-assistant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matter-server-data
  namespace: home-assistant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:2026.4.1
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/London"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: home-assistant-bootstrap
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

        - name: otbr
          image: homeassistant/amd64-addon-otbr:2.16.7
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - /scripts/entrypoint.sh
          volumeMounts:
            - name: otbr-data
              mountPath: /var/lib/thread
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: dev-net-tun
              mountPath: /dev/net/tun
            - name: thread-dataset
              mountPath: /tmp/thread-dataset
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        - name: matter-server
          image: ghcr.io/matter-js/python-matter-server:8.1.2
          args:
            - --storage-path
            - /data
            - --paa-root-cert-dir
            - /data/credentials
            - --primary-interface
            - eno1
            - --log-level
            - info
          volumeMounts:
            - name: matter-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 5580
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5580
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1000m"
              memory: 1Gi

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
        - name: home-assistant-bootstrap
          configMap:
            name: home-assistant-config
        - name: otbr-data
          persistentVolumeClaim:
            claimName: otbr-data
        - name: matter-data
          persistentVolumeClaim:
            claimName: matter-server-data
        - name: scripts
          configMap:
            name: otbr-scripts
            defaultMode: 0755
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: thread-dataset
          secret:
            secretName: thread-dataset
