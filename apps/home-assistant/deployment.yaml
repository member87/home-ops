---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config
  namespace: home-assistant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matter-server-data
  namespace: home-assistant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:2026.4.1
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/London"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: home-assistant-bootstrap
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

        - name: matter-server
          image: ghcr.io/matter-js/python-matter-server:8.1.2
          args:
            - --storage-path
            - /data
            - --paa-root-cert-dir
            - /data/credentials
            - --primary-interface
            - eno1
            - --log-level
            - info
          volumeMounts:
            - name: matter-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 5580
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5580
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1000m"
              memory: 1Gi

        - name: mdns-advertiser
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - pip install --quiet zeroconf && python3 /scripts/advertise.py
          env:
            - name: OTBR_HOST
              value: "192.168.1.226"
            - name: OTBR_PORT
              value: "8080"
            - name: ADVERTISE_IP
              value: "10.0.0.21"
            - name: ADVERTISE_PORT
              value: "8080"
          volumeMounts:
            - name: mdns-scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
        - name: home-assistant-bootstrap
          configMap:
            name: home-assistant-config
        - name: matter-data
          persistentVolumeClaim:
            claimName: matter-server-data
        - name: mdns-scripts
          configMap:
            name: mdns-advertiser
            defaultMode: 0755
