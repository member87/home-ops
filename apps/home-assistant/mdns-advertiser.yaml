---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mdns-advertiser
  namespace: home-assistant
data:
  advertise.py: |
    #!/usr/bin/env python3
    import json
    import os
    import socket
    import time
    import urllib.request

    from zeroconf import Zeroconf, ServiceInfo

    OTBR_HOST = os.environ.get("OTBR_HOST", "192.168.1.226")
    OTBR_REST_PORT = int(os.environ.get("OTBR_PORT", "8080"))
    MDNS_INTERFACE_IP = os.environ.get("ADVERTISE_IP", "10.0.0.21")
    BORDER_AGENT_IP = os.environ.get("BORDER_AGENT_IP", OTBR_HOST)
    BORDER_AGENT_PORT = int(os.environ.get("BORDER_AGENT_PORT", "49191"))

    def get_json(path):
        req = urllib.request.Request(f"http://{OTBR_HOST}:{OTBR_REST_PORT}{path}")
        with urllib.request.urlopen(req, timeout=5) as resp:
            return json.loads(resp.read())

    def hex_bytes(value, field, length):
        try:
            decoded = bytes.fromhex(value)
        except (TypeError, ValueError):
            print(f"[mdns] Invalid hex for {field}: {value}", flush=True)
            return None
        if len(decoded) != length:
            print(f"[mdns] Invalid length for {field}: {len(decoded)}", flush=True)
            return None
        return decoded

    def build_properties(network_name, ext_pan_id_hex, ext_addr_hex, border_agent_id_hex):
        ext_pan_id = hex_bytes(ext_pan_id_hex, "ExtPanId", 8)
        ext_addr = hex_bytes(ext_addr_hex, "ExtAddress", 8)
        if ext_pan_id is None or ext_addr is None:
            return None

        properties = {
            b"nn": network_name.encode(),
            b"xp": ext_pan_id,
            b"xa": ext_addr,
            b"vn": b"OpenThread",
            b"mn": b"SLZB-06",
        }

        if border_agent_id_hex:
            border_agent_id = hex_bytes(border_agent_id_hex, "BorderAgentId", 16)
            if border_agent_id is not None:
                properties[b"id"] = border_agent_id

        return properties

    def get_otbr_info():
        try:
            data = get_json("/node")
            network_name = data.get("NetworkName", "OpenThread")
            ext_pan_id = data.get("ExtPanId")
            ext_addr = data.get("ExtAddress")
            border_agent_id = None
            try:
                border_agent_id = get_json("/node/ba-id")
            except Exception as err:
                print(f"[mdns] Could not read /node/ba-id: {err}", flush=True)
            return {
                "network_name": network_name,
                "ext_pan_id": ext_pan_id,
                "ext_addr": ext_addr,
                "border_agent_id": border_agent_id,
            }
        except Exception as e:
            print(f"[mdns] Error fetching OTBR info: {e}")
            return None

    def wait_for_otbr():
        for i in range(60):
            try:
                data = get_otbr_info()
                if data and data.get("ext_pan_id") and data.get("ext_addr"):
                    print(f"[mdns] OTBR at {OTBR_HOST}:{OTBR_REST_PORT} is ready", flush=True)
                    return data
                print("[mdns] OTBR missing ExtPanId/ExtAddress, waiting...", flush=True)
            except Exception:
                pass
            print(f"[mdns] Waiting for OTBR at {OTBR_HOST}:{OTBR_REST_PORT}... ({i+1}/60)", flush=True)
            time.sleep(5)
        return None

    def build_service(info_data):
        properties = build_properties(
            info_data["network_name"],
            info_data["ext_pan_id"],
            info_data["ext_addr"],
            info_data.get("border_agent_id"),
        )
        if properties is None:
            return None

        service_name = f"{info_data['network_name']}._meshcop._udp.local."
        return ServiceInfo(
            "_meshcop._udp.local.",
            service_name,
            addresses=[socket.inet_aton(BORDER_AGENT_IP)],
            port=BORDER_AGENT_PORT,
            properties=properties,
        )

    print("[mdns] Waiting for OTBR...", flush=True)
    info_data = wait_for_otbr()
    if not info_data:
        print("[mdns] ERROR: OTBR never became ready", flush=True)
        exit(1)

    info = build_service(info_data)
    if info is None:
        print("[mdns] ERROR: Could not build mDNS service record", flush=True)
        exit(1)

    zeroconf = Zeroconf(interfaces=[MDNS_INTERFACE_IP])
    print(
        f"[mdns] Registering _meshcop._udp on {MDNS_INTERFACE_IP} advertising {BORDER_AGENT_IP}:{BORDER_AGENT_PORT}",
        flush=True,
    )
    zeroconf.register_service(info, allow_name_change=True)
    print("[mdns] Service registered", flush=True)

    try:
        while True:
            latest = get_otbr_info()
            if latest is None:
                time.sleep(60)
                continue

            if (
                latest["network_name"] != info_data["network_name"]
                or latest["ext_pan_id"] != info_data["ext_pan_id"]
                or latest["ext_addr"] != info_data["ext_addr"]
                or latest.get("border_agent_id") != info_data.get("border_agent_id")
            ):
                print("[mdns] OTBR details changed, re-registering", flush=True)
                zeroconf.unregister_service(info)
                info_data = latest
                info = build_service(info_data)
                if info is None:
                    print("[mdns] Could not rebuild service, keeping old record", flush=True)
                    time.sleep(60)
                    continue
                zeroconf.register_service(info, allow_name_change=True)
            time.sleep(60)
    except Exception as e:
        print(f"[mdns] Error: {e}", flush=True)
    finally:
        try:
            zeroconf.unregister_service(info)
            zeroconf.close()
        except Exception:
            pass
