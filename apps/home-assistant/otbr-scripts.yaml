---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otbr-scripts
  namespace: home-assistant
data:
  slzb-tcp-bridge.py: |
    #!/usr/bin/env python3
    import os
    import selectors
    import socket
    import sys


    def main() -> None:
      if len(sys.argv) != 3:
        raise SystemExit("usage: slzb-tcp-bridge.py <host> <port>")

      host = sys.argv[1]
      port = int(sys.argv[2])

      sock = socket.create_connection((host, port))
      sock.setblocking(False)

      selector = selectors.DefaultSelector()
      stdin_fd = sys.stdin.fileno()
      stdout = sys.stdout.buffer

      selector.register(sock, selectors.EVENT_READ, "socket")
      selector.register(stdin_fd, selectors.EVENT_READ, "stdin")

      try:
        while True:
          for key, _ in selector.select():
            if key.data == "socket":
              data = sock.recv(4096)
              if not data:
                return
              stdout.write(data)
              stdout.flush()
              continue

            data = os.read(stdin_fd, 4096)
            if not data:
              try:
                sock.shutdown(socket.SHUT_WR)
              except OSError:
                pass
              selector.unregister(stdin_fd)
              continue

            sock.sendall(data)
      finally:
        sock.close()


    if __name__ == "__main__":
      main()
  entrypoint.sh: |
    #!/bin/sh
    set -e

    OT_CTL="/opt/otbr-beta/sbin/ot-ctl"
    DATASET_FILE="/tmp/thread-dataset/dataset_hex"

    mkdir -p /var/lib/thread

    echo "[otbr] Creating ipsets..."
    ipset create -exist otbr-ingress-deny-src hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-deny-src-swap hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-allow-dst hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-allow-dst-swap hash:net family inet6 2>/dev/null || true

    echo "[otbr] Starting otbr-agent..."
    /opt/otbr-beta/sbin/otbr-agent \
      -I wpan0 \
      -B eno1 \
      --rest-listen-address 0.0.0.0 \
      --rest-listen-port 8081 \
      -d5 -v -s \
      "spinel+hdlc+forkpty:///usr/bin/python3?forkpty-arg=-u&forkpty-arg=/scripts/slzb-tcp-bridge.py&forkpty-arg=192.168.1.226&forkpty-arg=6638" \
      trel://eno1 &

    OTBR_PID=$!
    echo "[otbr] otbr-agent started with PID $OTBR_PID"

    echo "[otbr] Waiting for REST API..."
    max_attempts=60
    attempt=0
    while [ $attempt -lt $max_attempts ]; do
      if curl -sf http://localhost:8081/node/state >/dev/null 2>&1; then
        echo "[otbr] REST API is ready"
        break
      fi
      attempt=$((attempt + 1))
      echo "[otbr] Attempt $attempt/$max_attempts..."
      sleep 5
    done

    if [ $attempt -eq $max_attempts ]; then
      echo "[otbr] ERROR: REST API did not become ready"
      exit 1
    fi

    CURRENT_STATE=$(${OT_CTL} state 2>/dev/null | head -1 | tr -d '\r')
    echo "[otbr] Current Thread state: '${CURRENT_STATE}'"

    if [ -f "${DATASET_FILE}" ]; then
      DATASET=$(cat "${DATASET_FILE}" | tr -d '\r\n ')

      if [ "${CURRENT_STATE}" != "disabled" ]; then
        echo "[otbr] Stopping Thread to apply sealed secret dataset..."
        ${OT_CTL} thread stop 2>/dev/null || true
        sleep 2
      fi

      echo "[otbr] Setting active dataset from sealed secret..."
      ${OT_CTL} dataset set active "${DATASET}" || {
        echo "[otbr] WARNING: Failed to set dataset"
      }
      ${OT_CTL} dataset commit active || true

      echo "[otbr] Starting Thread..."
      ${OT_CTL} thread start

      echo "[otbr] Waiting for Thread to attach..."
      attach_attempts=0
      max_attach=30
      while [ ${attach_attempts} -lt ${max_attach} ]; do
        STATE=$(${OT_CTL} state 2>/dev/null | head -1 | tr -d '\r')
        case "${STATE}" in
          leader|router|child)
            echo "[otbr] Thread attached as: ${STATE}"
            break
            ;;
        esac
        attach_attempts=$((attach_attempts + 1))
        echo "[otbr] Waiting to attach... (state: ${STATE}, attempt ${attach_attempts}/${max_attach})"
        sleep 5
      done
    else
      echo "[otbr] No sealed secret dataset, using existing data"
      case "${CURRENT_STATE}" in
        disabled|detached)
          ${OT_CTL} thread start || true
          ;;
      esac
    fi

    echo "[otbr] Enabling TREL..."
    ${OT_CTL} trel enable || true

    echo "[otbr] Setting TX power to 6..."
    ${OT_CTL} txpower 6 || true

    COMMISSIONER_STATE=$(${OT_CTL} commissioner state 2>/dev/null | head -1 | tr -d '\r')
    echo "[otbr] Commissioner state: '${COMMISSIONER_STATE}'"
    case "${COMMISSIONER_STATE}" in
      disabled)
        echo "[otbr] Starting commissioner..."
        ${OT_CTL} commissioner start
        sleep 2
        COMMISSIONER_STATE=$(${OT_CTL} commissioner state 2>/dev/null | head -1 | tr -d '\r')
        echo "[otbr] Commissioner state after start: '${COMMISSIONER_STATE}'"
        ;;
      *)
        echo "[otbr] Commissioner already: ${COMMISSIONER_STATE}"
        ;;
    esac

    echo "[otbr] Initialization complete - keeping container alive"

    wait ${OTBR_PID}
