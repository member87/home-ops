{{- $includeFiles := default (list) .Values.includeFiles -}}
{{- if gt (len $includeFiles) 0 -}}
{{- range $pattern := $includeFiles -}}
{{- range $path, $_ := $.Files.Glob $pattern -}}
---
{{ $.Files.Get $path }}
{{- end -}}
{{- end -}}
{{- else -}}
{{- $manifestGlobs := default (list "*.yaml" "*/*.yaml") .Values.manifestGlobs -}}
{{- $excludeFiles := default (list "Chart.yaml" "values.yaml" "kustomization.yaml") .Values.excludeFiles -}}
{{- range $pattern := $manifestGlobs -}}
{{- range $path, $_ := $.Files.Glob $pattern -}}
{{- if not (has (base $path) $excludeFiles) -}}
---
{{ $.Files.Get $path }}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
