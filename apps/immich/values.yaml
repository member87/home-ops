controllers:
  main:
    containers:
      main:
        image:
          tag: v2.0.0
        env:
          DB_URL:
            valueFrom:
              secretKeyRef:
                name: immich-secrets
                key: DB_URL
          DB_VECTOR_EXTENSION: pgvector
          TZ: Europe/London

immich:
  persistence:
    library:
      existingClaim: immich-library

server:
  controllers:
    main:
      containers:
        main:
          env:
            IMMICH_CONFIG_FILE: /immich-config/immich-config.yaml
  persistence:
    immich-config:
      enabled: true
      type: secret
      name: immich-oidc-config
      globalMounts:
        - path: /immich-config
          readOnly: true

valkey:
  enabled: true
  persistence:
    data:
      type: persistentVolumeClaim
      storageClass: longhorn
      size: 2Gi
      accessMode: ReadWriteOnce

machine-learning:
  persistence:
    cache:
      type: persistentVolumeClaim
      storageClass: longhorn
      size: 20Gi
      accessMode: ReadWriteOnce
