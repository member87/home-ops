---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matter-server
  namespace: matter
  labels:
    app: matter-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: matter-server
  template:
    metadata:
      labels:
        app: matter-server
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: matter-server
          image: ghcr.io/matter-js/python-matter-server:8.1.2
          args:
            - --storage-path
            - /data
            - --paa-root-cert-dir
            - /data/credentials
            - --primary-interface
            - eno1
            - --log-level
            - info
          ports:
            - containerPort: 5580
              name: ws
              protocol: TCP
          volumeMounts:
            - name: matter-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1000m"
              memory: 1Gi
      volumes:
        - name: matter-data
          persistentVolumeClaim:
            claimName: matter-server-data
