---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otbr-bridge
  namespace: matter
data:
  slzb-tcp-bridge.py: |
    #!/usr/bin/env python3
    import os
    import selectors
    import socket
    import sys


    def main() -> None:
      if len(sys.argv) != 3:
        raise SystemExit("usage: slzb-tcp-bridge.py <host> <port>")

      host = sys.argv[1]
      port = int(sys.argv[2])

      sock = socket.create_connection((host, port))
      sock.setblocking(False)

      selector = selectors.DefaultSelector()
      stdin_fd = sys.stdin.fileno()
      stdout = sys.stdout.buffer

      selector.register(sock, selectors.EVENT_READ, "socket")
      selector.register(stdin_fd, selectors.EVENT_READ, "stdin")

      try:
        while True:
          for key, _ in selector.select():
            if key.data == "socket":
              data = sock.recv(4096)
              if not data:
                return
              stdout.write(data)
              stdout.flush()
              continue

            data = os.read(stdin_fd, 4096)
            if not data:
              try:
                sock.shutdown(socket.SHUT_WR)
              except OSError:
                pass
              selector.unregister(stdin_fd)
              continue

            sock.sendall(data)
      finally:
        sock.close()


    if __name__ == "__main__":
      main()
  entrypoint.sh: |
    #!/bin/sh
    set -e

    OT_CTL="/opt/otbr-beta/sbin/ot-ctl"
    DATASET_FILE="/tmp/thread-dataset/dataset_hex"

    mkdir -p /var/lib/thread

    ipset create -exist otbr-ingress-deny-src hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-deny-src-swap hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-allow-dst hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-allow-dst-swap hash:net family inet6 2>/dev/null || true

    echo "[otbr] Starting mdnsd..."
    /opt/otbr-stable/sbin/mdnsd -debug &

    echo "[otbr] Waiting for mdnsd..."
    sleep 2

    echo "[otbr] Starting otbr-web..."
    /opt/otbr-beta/sbin/otbr-web -I wpan0 -d6 -s -a "::" -p 8080 &

    echo "[otbr] Starting otbr-agent..."
    exec /opt/otbr-beta/sbin/otbr-agent \
      -I wpan0 \
      -B eno1 \
      --rest-listen-address 0.0.0.0 \
      --rest-listen-port 8081 \
      -d5 -v -s \
      "spinel+hdlc+forkpty:///usr/bin/python3?forkpty-arg=-u&forkpty-arg=/etc/otbr/slzb-tcp-bridge.py&forkpty-arg=192.168.1.226&forkpty-arg=6638" \
      trel://eno1
