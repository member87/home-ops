---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otbr
  namespace: matter
  labels:
    app: otbr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: otbr
  template:
    metadata:
      labels:
        app: otbr
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: otbr
          image: homeassistant/amd64-addon-otbr:2.16.6
          command:
            - /bin/sh
            - /scripts/entrypoint.sh
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          volumeMounts:
            - name: otbr-data
              mountPath: /data/thread
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: bridge-script
              mountPath: /etc/otbr/slzb-tcp-bridge.py
              subPath: slzb-tcp-bridge.py
              readOnly: true
            - name: dev-net-tun
              mountPath: /dev/net/tun
          ports:
            - containerPort: 8081
              name: rest
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: rest
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: rest
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: otbr-data
          persistentVolumeClaim:
            claimName: otbr-data
        - name: scripts
          configMap:
            name: otbr-bridge
            defaultMode: 0755
        - name: bridge-script
          configMap:
            name: otbr-bridge
            defaultMode: 0755
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
