---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otbr-init
  namespace: matter
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e

    OT_CTL="/opt/otbr-beta/sbin/ot-ctl"
    DATASET_FILE="/tmp/thread-dataset/dataset_hex"

    mkdir -p /var/lib/thread

    echo "[otbr-entrypoint] Creating ipsets..."
    ipset create -exist otbr-ingress-deny-src hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-deny-src-swap hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-allow-dst hash:net family inet6 2>/dev/null || true
    ipset create -exist otbr-ingress-allow-dst-swap hash:net family inet6 2>/dev/null || true

    echo "[otbr-entrypoint] Starting otbr-agent in background..."
    /opt/otbr-beta/sbin/otbr-agent \
      -I wpan0 \
      -B eno1 \
      --rest-listen-address 0.0.0.0 \
      --rest-listen-port 8081 \
      -d5 -v -s \
      "spinel+hdlc+forkpty:///usr/bin/python3?forkpty-arg=-u&forkpty-arg=/etc/otbr/slzb-tcp-bridge.py&forkpty-arg=192.168.1.226&forkpty-arg=6638" \
      trel://eno1 &

    OTBR_PID=$!
    echo "[otbr-entrypoint] otbr-agent started with PID $OTBR_PID"

    echo "[otbr-entrypoint] Waiting for REST API..."
    max_attempts=60
    attempt=0
    while [ $attempt -lt $max_attempts ]; do
      if curl -sf http://localhost:8081/node/state >/dev/null 2>&1; then
        echo "[otbr-entrypoint] REST API is ready"
        break
      fi
      attempt=$((attempt + 1))
      echo "[otbr-entrypoint] Attempt $attempt/$max_attempts..."
      sleep 5
    done

    if [ $attempt -eq $max_attempts ]; then
      echo "[otbr-entrypoint] ERROR: REST API did not become ready"
      exit 1
    fi

    CURRENT_STATE=$(${OT_CTL} state 2>/dev/null | head -1)
    echo "[otbr-entrypoint] Current Thread state: $CURRENT_STATE"

    if [ "$CURRENT_STATE" = "disabled" ] || [ "$CURRENT_STATE" = "detached" ]; then
      if [ -f "$DATASET_FILE" ]; then
        DATASET=$(cat "$DATASET_FILE")
        echo "[otbr-entrypoint] Setting active dataset from sealed secret..."
        ${OT_CTL} dataset set active "$DATASET" || {
          echo "[otbr-entrypoint] WARNING: Failed to set dataset"
        }
      else
        echo "[otbr-entrypoint] No dataset file found, using existing dataset"
      fi

      echo "[otbr-entrypoint] Starting Thread..."
      ${OT_CTL} thread start

      echo "[otbr-entrypoint] Waiting for Thread to attach..."
      attach_attempts=0
      max_attach=30
      while [ $attach_attempts -lt $max_attach ]; do
        STATE=$(${OT_CTL} state 2>/dev/null | head -1)
        if [ "$STATE" = "leader" ] || [ "$STATE" = "router" ] || [ "$STATE" = "child" ]; then
          echo "[otbr-entrypoint] Thread attached as: $STATE"
          break
        fi
        attach_attempts=$((attach_attempts + 1))
        echo "[otbr-entrypoint] Waiting to attach... (state: $STATE, attempt $attach_attempts/$max_attach)"
        sleep 5
      done
    else
      echo "[otbr-entrypoint] Thread already running as: $CURRENT_STATE"
    fi

    echo "[otbr-entrypoint] Enabling TREL..."
    ${OT_CTL} trel enable || true

    echo "[otbr-entrypoint] Setting TX power to 6..."
    ${OT_CTL} txpower 6 || true

    COMMISSIONER_STATE=$(${OT_CTL} commissioner state 2>/dev/null | head -1)
    if [ "$COMMISSIONER_STATE" = "disabled" ]; then
      echo "[otbr-entrypoint] Starting commissioner..."
      ${OT_CTL} commissioner start
      sleep 2
      COMMISSIONER_STATE=$(${OT_CTL} commissioner state 2>/dev/null | head -1)
      echo "[otbr-entrypoint] Commissioner state: $COMMISSIONER_STATE"
    else
      echo "[otbr-entrypoint] Commissioner already: $COMMISSIONER_STATE"
    fi

    echo "[otbr-entrypoint] Initialization complete - keeping container alive"

    wait $OTBR_PID
