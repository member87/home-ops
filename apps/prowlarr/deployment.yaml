---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prowlarr-config
  namespace: prowlarr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: prowlarr
  labels:
    app: prowlarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      # Use cluster DNS to resolve qBittorrent's dedicated Gluetun proxy
      # Prowlarr traffic is routed through HTTP_PROXY
      dnsPolicy: ClusterFirst
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: prowlarr
          image: ghcr.io/home-operations/prowlarr:2.5.0
          ports:
            - containerPort: 9696
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/London"
            
            # ============================================
            # Prowlarr Application Configuration
            # Format: PROWLARR__SECTION__KEY
            # ============================================
            
            # Server Configuration
            - name: PROWLARR__SERVER__PORT
              value: "9696"
            - name: PROWLARR__SERVER__BINDADDRESS
              value: "*"
            - name: PROWLARR__SERVER__URLBASE
              value: ""
            
            # Authentication - Using External (Tinyauth ForwardAuth)
            - name: PROWLARR__AUTH__METHOD
              value: "External"
            - name: PROWLARR__AUTH__REQUIRED
              value: "DisabledForLocalAddresses"
            
            # API Key from sealed secret
            - name: PROWLARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: prowlarr-secrets
                  key: api-key
            
            # Logging Configuration
            - name: PROWLARR__LOG__LEVEL
              value: "info"
            - name: PROWLARR__LOG__CONSOLEFORMAT
              value: "Standard"
            - name: PROWLARR__LOG__ANALYTICSENABLED
              value: "false"
            - name: PROWLARR__LOG__DBENABLED
              value: "true"
            
            # Update Configuration (Docker-managed)
            - name: PROWLARR__UPDATE__BRANCH
              value: "master"
            - name: PROWLARR__UPDATE__MECHANISM
              value: "Docker"
            
            # Application Settings
            - name: PROWLARR__APP__INSTANCENAME
              value: "Prowlarr"
            - name: PROWLARR__APP__THEME
              value: "auto"
            - name: PROWLARR__APP__LAUNCHBROWSER
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: indexer-definitions
              mountPath: /config/Definitions
              readOnly: true
          livenessProbe:
            httpGet:
              path: /ping
              port: 9696
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 9696
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config
        - name: indexer-definitions
          projected:
            sources:
              - configMap:
                  name: prowlarr-indexer-exttorrents

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: byparr
  namespace: prowlarr
  labels:
    app: byparr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: byparr
  template:
    metadata:
      labels:
        app: byparr
    spec:
      containers:
        - name: byparr
          image: ghcr.io/thephaseless/byparr@sha256:01a46a2865d9a6db5eb8ead04ec0dd33b8fbe233e8565ae70b50d4cc0af4cfb0
          ports:
            - containerPort: 8191
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/London"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
