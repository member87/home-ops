---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttyd
  namespace: ttyd
  labels:
    app: ttyd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ttyd
  template:
    metadata:
      labels:
        app: ttyd
    spec:
      serviceAccountName: ttyd
      containers:
        - name: ttyd-k9s
          image: dylanbstorey/ttyd-k9s:v0.0.2
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: HOME
              value: /home/ttyd
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /bin/sh
            - -c
          args:
            - >-
              kubectl config set-cluster in-cluster
              --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
              --certificate-authority="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              --embed-certs=true
              --kubeconfig=/tmp/kubeconfig &&
              kubectl config set-credentials in-cluster
              --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              --kubeconfig=/tmp/kubeconfig &&
              kubectl config set-context in-cluster
              --cluster=in-cluster
              --user=in-cluster
              --namespace="${POD_NAMESPACE}"
              --kubeconfig=/tmp/kubeconfig &&
              kubectl config use-context in-cluster --kubeconfig=/tmp/kubeconfig &&
              export KUBECONFIG=/tmp/kubeconfig &&
              exec ttyd -p 8080 -W k9s -A --readonly
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
