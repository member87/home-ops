apiVersion: v1
kind: Namespace
metadata:
  name: unpoller
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: unpoller
  name: unpoller
  namespace: unpoller
spec:
  ports:
  - name: metrics
    port: 9130
    targetPort: metrics
  selector:
    app: unpoller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpoller
  namespace: unpoller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unpoller
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9130"
        prometheus.io/scrape: "true"
      labels:
        app: unpoller
    spec:
      containers:
      - env:
        - name: UP_UNIFI_DEFAULT_URL
          value: https://192.168.1.1
        - name: UP_UNIFI_DEFAULT_USER
          value: unpoller
        - name: UP_UNIFI_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              key: password
              name: unpoller-secret
        - name: UP_UNIFI_DEFAULT_VERIFY_SSL
          value: "false"
        - name: UP_UNIFI_DEFAULT_SAVE_SITES
          value: "true"
        - name: UP_UNIFI_DEFAULT_SAVE_DPI
          value: "true"
        - name: UP_PROMETHEUS_HTTP_LISTEN
          value: 0.0.0.0:9130
        - name: UP_PROMETHEUS_DISABLE
          value: "false"
        - name: UP_INFLUXDB_DISABLE
          value: "true"
        image: ghcr.io/unpoller/unpoller:v2.39.0
        livenessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 10
        name: unpoller
        ports:
        - containerPort: 9130
          name: metrics
        readinessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: unpoller-secret
  namespace: unpoller
spec:
  encryptedData:
    password: 
  template:
    metadata:
      name: unpoller-secret
      namespace: unpoller
    type: Opaque
